; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; 默认编译涂鸦 TuyaLink 固件。
default_envs = freenove_esp32_s3_wroom

[env:freenove_esp32_s3_wroom]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino
extra_scripts = pre:extra_script.py
; 涂鸦构建使用 tuya_link.cpp，保留但不编译原平台 mqtt.cpp。
build_src_filter =
	+<*>
	-<mqtt.cpp>
build_flags = 
    -Wl,-Map=/dev/null
lib_deps =
	bblanchon/ArduinoJson@^7.4.2
	emelianov/modbus-esp8266@^4.1.0
	knolleary/PubSubClient@^2.8.0

; 原平台回退构建：排除 TuyaLink，并通过宏恢复 mqtt.h/mqtt.cpp。
[env:legacy_freenove_esp32_s3_wroom]
extends = env:freenove_esp32_s3_wroom
build_src_filter =
	+<*>
	-<tuya_link.cpp>
build_flags =
	-Wl,-Map=/dev/null
	-DUSE_LEGACY_MQTT
