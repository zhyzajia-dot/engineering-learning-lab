[platformio]
; 主源码直接放在本目录，而不是 PlatformIO 默认的 src/ 子目录。
src_dir = .

[env]
; 两个角色共用 ESP-01 1 MB 硬件、Arduino 框架和串口配置。
platform = espressif8266
board = esp01_1m
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_upload.resetmethod = nodemcu

[env:pc_bridge]
; PC 端：安装在 USB 下载器中，连接电脑上位机。
build_flags = -D BRIDGE_SIDE_PC=1

[env:car_bridge]
; 小车端：UART 连接 MSPM0。
build_flags = -D BRIDGE_SIDE_PC=0
